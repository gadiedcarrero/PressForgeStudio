<!DOCTYPE html>
<html lang="es" class="dark">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>PressForge Studio · Acceso</title>
  <link rel="icon" type="image/png" href="/assets/favicon.png" />
  <script src="https://cdn.tailwindcss.com"></script>
  <style>body{background:#0a0b0f}</style>
</head>
<body class="text-zinc-100 min-h-screen grid place-items-center p-4">
  <div class="w-full max-w-sm">
    <div class="flex flex-col items-center mb-6">
      <img src="/assets/IsoTipo.png" alt="PressForge" class="h-16 w-16 rounded-2xl bg-white object-cover mb-3" />
      <div class="text-xl font-bold tracking-tight">PressForge Studio</div>
      <div id="subtitle" class="text-sm text-zinc-500">Cargando…</div>
    </div>

    <!-- Activación de licencia -->
    <div id="cardLicense" class="hidden bg-zinc-900/60 border border-zinc-800 rounded-2xl p-5">
      <label class="block text-sm mb-1 text-zinc-400">Clave de licencia</label>
      <textarea id="lic" rows="3" placeholder="Pega aquí tu clave de licencia"
        class="w-full mb-3 bg-zinc-950 border border-zinc-800 rounded-lg px-3 py-2 text-xs font-mono focus:outline-none focus:ring-2 focus:ring-indigo-500"></textarea>
      <button id="actBtn" type="button"
        class="w-full bg-gradient-to-r from-indigo-500 to-fuchsia-500 hover:opacity-90 disabled:opacity-40 rounded-lg py-2.5 font-semibold text-sm transition">Activar</button>
      <p id="licMsg" class="text-xs text-red-400 mt-2 min-h-[1rem]"></p>
    </div>

    <!-- Contraseña -->
    <div id="cardPassword" class="hidden bg-zinc-900/60 border border-zinc-800 rounded-2xl p-5">
      <label id="lbl" class="block text-sm mb-1 text-zinc-400">Contraseña</label>
      <input id="pw" type="password" title="Contraseña" placeholder="Tu contraseña" autocomplete="current-password"
        class="w-full mb-3 bg-zinc-950 border border-zinc-800 rounded-lg px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500" />
      <input id="pw2" type="password" placeholder="Repite la contraseña" autocomplete="new-password"
        class="hidden w-full mb-3 bg-zinc-950 border border-zinc-800 rounded-lg px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500" />
      <button id="pwBtn" type="button"
        class="w-full bg-gradient-to-r from-indigo-500 to-fuchsia-500 hover:opacity-90 disabled:opacity-40 rounded-lg py-2.5 font-semibold text-sm transition">Entrar</button>
      <p id="pwMsg" class="text-xs text-red-400 mt-2 min-h-[1rem]"></p>
    </div>
  </div>
<script>
const $ = (id) => document.getElementById(id);
let SETUP = false;

async function init(){
  let st = { licensed:false, has_password:false };
  try { st = await (await fetch('/api/auth-status')).json(); } catch(e){}
  if (!st.licensed){
    $('subtitle').textContent = 'Activa tu licencia';
    $('cardLicense').classList.remove('hidden');
    $('cardPassword').classList.add('hidden');
    return;
  }
  $('cardLicense').classList.add('hidden');
  $('cardPassword').classList.remove('hidden');
  SETUP = !st.has_password;
  if (SETUP){
    $('subtitle').textContent = 'Crea tu contraseña';
    $('lbl').textContent = 'Nueva contraseña';
    $('pw').autocomplete = 'new-password';
    $('pw2').classList.remove('hidden');
    $('pwBtn').textContent = 'Crear y entrar';
  } else {
    $('subtitle').textContent = 'Inicia sesión';
  }
}

async function activate(){
  const key = $('lic').value.trim();
  if (!key){ return; }
  $('actBtn').disabled = true; $('licMsg').textContent = '';
  try {
    const j = await (await fetch('/api/activate', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ key }) })).json();
    if (j.ok){ await init(); return; }
    $('licMsg').textContent = j.error || 'Licencia inválida';
  } catch(e){ $('licMsg').textContent = 'Error de conexión'; }
  finally { $('actBtn').disabled = false; }
}

async function submitPw(){
  const pw = $('pw').value; $('pwMsg').textContent = '';
  if (SETUP){
    if (pw.length < 4){ $('pwMsg').textContent = 'Mínimo 4 caracteres.'; return; }
    if (pw !== $('pw2').value){ $('pwMsg').textContent = 'Las contraseñas no coinciden.'; return; }
  }
  $('pwBtn').disabled = true;
  try {
    const r = await fetch(SETUP ? '/api/setup' : '/api/login', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ password: pw }) });
    const j = await r.json();
    if (j.ok){ location.href = '/'; return; }
    $('pwMsg').textContent = j.error || 'Error';
  } catch(e){ $('pwMsg').textContent = 'Error de conexión'; }
  finally { $('pwBtn').disabled = false; }
}

$('actBtn').addEventListener('click', activate);
$('pwBtn').addEventListener('click', submitPw);
$('pw').addEventListener('keydown', e => { if(e.key==='Enter' && !SETUP) submitPw(); });
$('pw2').addEventListener('keydown', e => { if(e.key==='Enter') submitPw(); });
init();
</script>
</body>
</html>
